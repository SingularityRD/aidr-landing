      - generic [ref=e111]:
        - generic [ref=e112]: Why AIDR Wins
        - generic [ref=e113]:
          - generic [ref=e114]:
            - generic [ref=e115]: Only tool-call protection
            - generic [ref=e116]: No competitor protects Bash commands, file writes, network requests, and MCP tool calls before execution. AIDR is the only agent runtime security layer.
          - generic [ref=e117]:
            - generic [ref=e118]: Local-first, offline-capable
            - generic [ref=e119]: Every competitor requires cloud connectivity. AIDR runs fully offline with cached verdicts. Cloud sync is optional.
          - generic [ref=e120]:
            - generic [ref=e121]: Fail-open by design
            - generic [ref=e122]: Competitors block on error. AIDR never breaks your agent — every internal error returns 'allow'. Your workflow never stops.
          - generic [ref=e123]:
            - generic [ref=e124]: Developer-native onboarding
            - generic [ref=e125]: No admin-led deployment. No API keys to configure. Install by prompt in Claude Code, authorize in browser, and go.
          - generic [ref=e126]:
            - generic [ref=e127]: Per-agent pricing ($5/mo)
            - generic [ref=e128]: Competitors charge per API call ($99-499/mo for meaningful volume). AIDR charges per agent. Predictable, simple, and up to 20x cheaper at scale.
          - generic [ref=e129]:
            - generic [ref=e130]: Privacy by architecture
            - generic [ref=e131]: AIDR never sends code, prompts, or file contents externally. Competitors send everything to their cloud for analysis.
